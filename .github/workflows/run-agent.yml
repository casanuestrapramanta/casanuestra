name: Tzoumerka Robot Agent

on:
  # Σου επιτρέπει να πατάς ένα κουμπί στο GitHub και να τρέχει live εκείνη τη στιγμή
  workflow_dispatch:
  # Τρέχει αυτόματα μόνο του κάθε μέρα στις 8 το πρωί
  schedule:
    - cron: '0 8 1 * *'

jobs:
  run-robot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Δίνουμε άδεια στο ρομπότ να γράφει αρχεία στο GitHub μας
    steps:
      - name: Κατέβασμα του κώδικα
        uses: actions/checkout@v4

      - name: Εγκατάσταση του Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Τρέξε τον Agent!
        run: node agent.js

      - name: Αποθήκευση του voreia_tzoumerka.json στο GitHub
        run: |
          git config --global user.name 'Tzoumerka-Agent-Bot'
          git config --global user.email 'bot@casanuestra.com'
          git add voreia_tzoumerka.json
          git commit -m "🤖 Αυτόματη ενημέρωση τουριστικού οδηγού" || echo "Δεν υπήρχαν αλλαγές"
          git push